<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수능_EDEN_MAP 실시간 학습 관리 시스템 v24</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search);
        let studentId = urlParams.get('id') || "";

        window.db = db;
        window.studentId = studentId;

        window.loadStudent = () => {
            const val = document.getElementById('sharedId').value;
            if(val) location.href = '?id=' + val;
        };

        window.savePlan = async function() {
            if(!window.studentId) return alert("관리 ID 입력 후 엔터를 눌러주세요.");
            const data = {
                subjects: window.subjects,
                config: {
                    startDate: document.getElementById('startDate').value,
                    examDate: document.getElementById('examDate').value,
                    seat: document.getElementById('seat').value,
                    name: document.getElementById('name').value
                }
            };
            try {
                await setDoc(doc(db, "EDEN_MAP_EXAM", window.studentId), data);
                alert("📋 서버에 실시간 저장 및 공유되었습니다.");
            } catch (e) { alert("Firebase 설정을 확인하세요."); }
        };

        if(window.studentId) {
            onSnapshot(doc(db, "EDEN_MAP_EXAM", window.studentId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    window.subjects = data.subjects || [];
                    document.getElementById('startDate').value = data.config.startDate;
                    document.getElementById('examDate').value = data.config.examDate;
                    document.getElementById('seat').value = data.config.seat;
                    document.getElementById('name').value = data.config.name;
                    document.getElementById('sharedId').value = window.studentId;
                    renderAll();
                }
            });
        }
    </script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --p-main: #1e3a8a; --p-accent: #059669; --p-border: #cbd5e1; 
            --p-bg: #f8fafc; --sun: #ef4444; --sat: #3b82f6; --p-red: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; color: #1e293b; margin: 0; padding: 0; }
        body { background-color: #94a3b8; display: flex; height: 100vh; overflow: hidden; }

        /* 사이드바 */
        #sidebar { width: 395px; background: #fff; padding: 15px; border-right: 3px solid var(--p-main); overflow-y: auto; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        .ui-title { font-size: 13px; font-weight: 800; border-left: 5px solid var(--p-main); padding-left: 8px; color: var(--p-main); }
        .input-card { background: var(--p-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--p-border); display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; font-weight: bold; color: #64748b; }
        input, select, button { padding: 6px; border: 1px solid var(--p-border); border-radius: 4px; font-size: 12px; outline: none; background: #fff; width: 100%; }

        .grid-row { display: grid; gap: 6px; align-items: flex-end; width: 100%; }
        .row-2 { grid-template-columns: 1fr 1fr; }
        .row-range { grid-template-columns: 1fr 1fr 0.6fr; }
        
        .student-header { display: flex; justify-content: flex-end; align-items: center; gap: 6px; }
        #seat { width: 50px; text-align: center; }
        #name { width: 100px; text-align: center; }

        .day-rate-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .day-box { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .day-btn { width: 100%; font-size: 9px; font-weight: bold; padding: 4px 0; border: 1px solid var(--p-border); border-radius: 3px; cursor: pointer; text-align: center; background: #fff; }
        .day-btn.active { background: var(--p-main); color: #fff; border-color: var(--p-main); }
        .day-input { width: 100%; height: 24px; text-align: center; font-size: 11px !important; padding: 0 !important; }

        #manageList { display: flex; flex-direction: column; gap: 3px; }
        .manage-item { background: #fff; border: 1px solid var(--p-border); padding: 4px 8px; border-radius: 4px; font-size: 10.5px; display: flex; justify-content: space-between; align-items: center; }
        .item-ctrls { display: flex; gap: 6px; }
        .edit-txt { color: var(--p-accent); cursor: pointer; font-weight: bold; }
        .del-txt { color: var(--sun); cursor: pointer; font-weight: bold; }

        .add-btn { background: var(--p-main); color: #fff; font-weight: bold; cursor: pointer; border: none; padding: 10px; margin-top: 5px; }
        .save-btn { background: #ea580c; color: #fff; font-weight: bold; cursor: pointer; border: none; padding: 10px; }
        .print-btn { background: var(--p-accent); color: #fff; font-weight: bold; cursor: pointer; padding: 12px; border: none; margin-top: auto; }

        /* 미리보기 화면 최적화 */
        #preview { 
            flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; background: #94a3b8; 
            display: flex; flex-direction: column; align-items: center; gap: 0;
        }
        
        .page { 
            width: 297mm; height: 210mm; min-height: 210mm; 
            padding: 5mm 8mm; 
            background: #fff; display: flex; flex-direction: column; 
            scroll-snap-align: start; position: relative; overflow: hidden;
        }

        .combined-header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--p-main); padding-bottom: 3px; margin-bottom: 4px; 
        }
        .header-left { display: flex; align-items: baseline; gap: 8px; }
        .header-left h1 { font-size: 16px; color: var(--p-main); font-weight: 900; letter-spacing: 1px; margin: 0; }
        .academy-name { font-size: 11px; font-weight: 900; color: #64748b; }
        
        .header-right { display: flex; align-items: center; gap: 8px; font-size: 11px; }
        .exam-date-label { font-weight: 900; background: #000; color: #fff; padding: 2px 8px; border-radius: 3px; }
        .student-display { font-weight: bold; color: #64748b; }
        .student-display span { border-bottom: 1.5px solid #000; min-width: 30px; text-align: center; display: inline-block; color: #000; margin-left: 2px; }

        /* [수정점] 요일 헤더 분리 및 높이 최소화 (12px) */
        .calendar-head { 
            display: grid; grid-template-columns: repeat(7, 1fr); background: #f1f5f9; 
            border-top: 1px solid var(--p-border); border-left: 1px solid var(--p-border); 
            height: 12px;
        }
        .calendar-head div { 
            border-right: 1px solid var(--p-border); border-bottom: 1px solid var(--p-border); 
            padding: 0; height: 12px; line-height: 12px; text-align: center; font-size: 8px; font-weight: 900; 
        }
        
        /* 메인 캘린더 (날짜 부분) */
        .calendar { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            border-left: 1px solid var(--p-border); flex: 1; background: #fff; 
        }
        
        .day { border-right: 1px solid var(--p-border); border-bottom: 1px solid var(--p-border); padding: 1px 3px; position: relative; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .day.other-month { background: #f8fafc; opacity: 0.3; }
        .d-num-row { font-size: 9px; font-weight: 800; display: flex; justify-content: space-between; margin-bottom: 1px; line-height: 1; }
        .d-tag { font-size: 8px; color: var(--p-accent); font-weight: 900; }
        
        .task-list { font-size: 8.5px; line-height: 1.6; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .task-list.two-cols { display: grid; grid-template-columns: 1fr 1fr; column-gap: 6px; }
        .task-item { border-bottom: none; padding: 0; display: flex; align-items: center; gap: 2px; white-space: nowrap; overflow: hidden; }
        .task-item span { overflow: hidden; text-overflow: ellipsis; line-height: inherit; }
        
        .self-line { display: inline-block; border-bottom: 1px solid #94a3b8; width: 40px; height: 7px; vertical-align: middle; margin-left: 1px; }
        input[type="checkbox"] { accent-color: var(--p-red); width: 8px; height: 8px; cursor: pointer; margin-top: 1px; }

        .rot-bar { grid-column: 1 / span 7; padding: 2px 10px; font-size: 9px; font-weight: 900; border-right: 1px solid var(--p-border); border-bottom: 1px solid var(--p-border); display: flex; justify-content: space-between; align-items: center; color: #fff; }
        .rot-1 { background-color: #1e3a8a; } .rot-2 { background-color: #2563eb; } .rot-3 { background-color: #6366f1; } .rot-4 { background-color: #ef4444; }

        @media print {
            @page { size: A4 landscape; margin: 0; }
            #sidebar { display: none !important; }
            body { background: none; }
            #preview { padding: 0; display: block; overflow: visible; }
            .page { box-shadow: none; border: none; margin: 0; width: 297mm; height: 210mm; scroll-snap-align: none; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="ui-title">1. 기간 및 회독 설정</div>
    <div class="input-card">
        <label>관리 ID (Google Console)</label>
        <input type="text" id="sharedId" placeholder="ID 입력 후 엔터" onkeydown="if(event.keyCode==13) loadStudent()">
        <div class="grid-row row-2">
            <div><label>학습 시작일</label><input type="date" id="startDate" onchange="renderAll()"></div>
            <div><label>시험 날짜</label><input type="date" id="examDate" value="2026-05-31" onchange="renderAll()"></div>
        </div>
    </div>

    <div class="ui-title">2. 과제 및 학생 정보</div>
    <div class="input-card">
        <div class="student-header">
            <div style="display:flex; align-items:center; gap:3px;"><label>좌석:</label><input type="text" id="seat" placeholder="번호" oninput="syncSeatWithId(this.value)"></div>
            <div style="display:flex; align-items:center; gap:3px;"><label>이름:</label><input type="text" id="name" placeholder="학생명" oninput="renderAll()"></div>
        </div>
        <div class="col"><label>과목/교재명</label><input type="text" id="subName" placeholder="예: 국어_교과서"></div>
        <div class="grid-row row-range">
            <div><label>시작</label><input type="number" id="startNo" value="1"></div>
            <div><label>끝</label><input type="number" id="endNo" value="30"></div>
            <div><label>단위</label><select id="subUnit"><option value="강">강</option><option value="p">p</option></select></div>
        </div>
        <div class="grid-row row-2">
            <div><label>진도 시작일</label><input type="date" id="subStart"></div>
            <div><label>진도 종료(수동)</label><div style="display:flex; gap:3px; align-items:center;"><input type="checkbox" id="isManualEnd" onchange="document.getElementById('subEnd').disabled = !this.checked"><input type="date" id="subEnd" disabled></div></div>
        </div>
        <div style="font-size:11px;"><input type="checkbox" id="isSelf"> <label for="isSelf" style="cursor:pointer; font-weight:bold; color:var(--p-main);">학생 자율 기입 모드 (넓은 빈칸)</label></div>
        
        <label>학습 요일(클릭) 및 비중(0~5)</label>
        <div class="day-rate-grid">
            <div class="day-box"><div class="day-btn active" data-day="0" onclick="toggleDay(0, this)">일</div><input type="number" class="day-input" id="r0" value="0"></div>
            <div class="day-box"><div class="day-btn active" data-day="1" onclick="toggleDay(1, this)">월</div><input type="number" class="day-input" id="r1" value="1"></div>
            <div class="day-box"><div class="day-btn active" data-day="2" onclick="toggleDay(2, this)">화</div><input type="number" class="day-input" id="r2" value="1"></div>
            <div class="day-box"><div class="day-btn active" data-day="3" onclick="toggleDay(3, this)">수</div><input type="number" class="day-input" id="r3" value="1"></div>
            <div class="day-box"><div class="day-btn active" data-day="4" onclick="toggleDay(4, this)">목</div><input type="number" class="day-input" id="r4" value="1"></div>
            <div class="day-box"><div class="day-btn active" data-day="5" onclick="toggleDay(5, this)">금</div><input type="number" class="day-input" id="r5" value="1"></div>
            <div class="day-box"><div class="day-btn active" data-day="6" onclick="toggleDay(6, this)">토</div><input type="number" class="day-input" id="r6" value="2"></div>
        </div>
        
        <button class="add-btn" id="addBtn" onclick="addSubject()">과목 플랜 추가</button>
        <button class="save-btn" onclick="window.savePlan()">📋 플랜 DB 저장 및 공유</button>
    </div>
    <div class="ui-title">3. 과목 리스트 (수정 가능)</div>
    <div id="manageList"></div>
    <button class="print-btn" onclick="window.print()">🖨️ A4 가로 인쇄하기</button>
</div>
<div id="preview"></div>

<script>
    window.subjects = [];
    let editId = null;

    function syncSeatWithId(val) {
        document.getElementById('sharedId').value = val;
        window.studentId = val;
        renderAll();
    }

    function toggleDay(d, el) { el.classList.toggle('active'); renderAll(); }

    function addSubject() {
        const name = document.getElementById('subName').value;
        const subStartStr = document.getElementById('subStart').value;
        if(!name || !subStartStr) return alert("과목명과 시작일을 입력하세요.");
        
        const rates = [];
        for(let i=0; i<7; i++) {
            const btn = document.querySelector(`.day-btn[data-day="${i}"]`);
            rates.push(btn.classList.contains('active') ? parseFloat(document.getElementById('r'+i).value) : 0);
        }

        const startNo = parseInt(document.getElementById('startNo').value);
        const endNo = parseInt(document.getElementById('endNo').value);
        
        let finalEnd;
        if(document.getElementById('isManualEnd').checked) {
            finalEnd = document.getElementById('subEnd').value;
        } else {
            let total = endNo - startNo + 1;
            let curr = new Date(subStartStr);
            while(total > 0) {
                if(rates[curr.getDay()] > 0) total -= rates[curr.getDay()];
                if(total > 0) curr.setDate(curr.getDate() + 1);
            }
            finalEnd = curr.toISOString().split('T')[0];
        }

        const subData = {
            id: editId || Date.now(), name, startNo, endNo, rates, 
            subStart: subStartStr, subEnd: finalEnd, 
            isSelf: document.getElementById('isSelf').checked, 
            unit: document.getElementById('subUnit').value
        };

        if(editId) {
            window.subjects = window.subjects.map(s => s.id === editId ? subData : s);
            editId = null;
            document.getElementById('addBtn').innerText = "과목 플랜 추가";
        } else {
            window.subjects.push(subData);
        }
        document.getElementById('subName').value = "";
        renderAll();
    }

    function editSub(id) {
        const s = window.subjects.find(x => x.id === id);
        if(!s) return;
        document.getElementById('subName').value = s.name;
        document.getElementById('startNo').value = s.startNo;
        document.getElementById('endNo').value = s.endNo;
        document.getElementById('subStart').value = s.subStart;
        document.getElementById('subUnit').value = s.unit;
        document.getElementById('isSelf').checked = s.isSelf;
        for(let i=0; i<7; i++) {
            document.getElementById('r'+i).value = s.rates[i];
            const btn = document.querySelector(`.day-btn[data-day="${i}"]`);
            if(s.rates[i] > 0) btn.classList.add('active'); else btn.classList.remove('active');
        }
        editId = id;
        document.getElementById('addBtn').innerText = "내용 수정하기";
    }

    function deleteSub(id) { window.subjects = window.subjects.filter(s => s.id !== id); renderAll(); }

    function renderAll() {
        const list = document.getElementById('manageList');
        list.innerHTML = '';
        window.subjects.forEach(s => {
            list.innerHTML += `<div class="manage-item">
                <span><b>${s.name}</b></span>
                <div class="item-ctrls"><span class="edit-txt" onclick="editSub(${s.id})">수정</span><span class="del-txt" onclick="deleteSub(${s.id})">삭제</span></div>
            </div>`;
        });

        const preview = document.getElementById('preview');
        preview.innerHTML = '';
        const start = new Date(document.getElementById('startDate').value);
        const exam = new Date(document.getElementById('examDate').value);
        if(isNaN(start) || isNaN(exam)) return;

        let maxDate = null;
        window.subjects.forEach(s => {
            let ed = new Date(s.subEnd);
            if(!maxDate || ed > maxDate) maxDate = ed;
        });
        if(!maxDate) maxDate = new Date(exam);

        let iter = new Date(start.getFullYear(), start.getMonth(), 1);
        while(iter <= maxDate || (iter.getFullYear() == maxDate.getFullYear() && iter.getMonth() == maxDate.getMonth())) {
            renderMonth(iter.getFullYear(), iter.getMonth() + 1, start, exam);
            iter.setMonth(iter.getMonth() + 1);
            if(iter.getFullYear() > 2030) break;
        }
    }

    function renderMonth(year, month, totalStart, examDate) {
        const page = document.createElement('div');
        page.className = 'page';
        const phases = calculatePhases(totalStart, examDate);

        // [수정점] .calendar-head 부분을 .calendar 바깥으로 분리하여 늘어나지 않고 고정 높이를 가지게 설정했습니다.
        page.innerHTML = `
            <header class="combined-header">
                <div class="header-left">
                    <h1>EDEN_MAP ${year}년 ${month}월 내신대비 플래너</h1>
                    <span class="academy-name">이든관리형학습센터</span>
                </div>
                <div class="header-right">
                    <span class="exam-date-label">시험일: ${document.getElementById('examDate').value}</span>
                    <span class="student-display">좌석: <span>${document.getElementById('seat').value}</span> 성명: <span>${document.getElementById('name').value}</span></span>
                </div>
            </header>
            <div class="calendar-head"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div>
            <div class="calendar"></div>
        `;

        const grid = page.querySelector('.calendar');
        const first = new Date(year, month - 1, 1).getDay();
        const last = new Date(year, month, 0).getDate();
        for(let i=0; i<first; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day other-month'}));

        for(let d=1; d<=last; d++) {
            const curr = new Date(year, month - 1, d); curr.setHours(0,0,0,0);
            const cell = document.createElement('div'); cell.className = 'day';
            
            phases.forEach((p, idx) => {
                if(curr.getTime() === p.start.getTime()) {
                    const bar = document.createElement('div');
                    bar.className = `rot-bar rot-${idx+1}`;
                    bar.innerHTML = `<span>STEP ${idx+1}</span><span>${p.title}</span>`;
                    grid.appendChild(bar);
                }
            });

            const dayColor = curr.getDay() === 0 ? 'var(--sun)' : (curr.getDay() === 6 ? 'var(--sat)' : 'inherit');
            const dDiff = Math.ceil((examDate - curr) / 86400000);
            cell.innerHTML += `<div class="d-num-row"><span style="color:${dayColor}">${d}</span><span class="d-tag">${dDiff>0?'D-'+dDiff:(dDiff==0?'D-DAY':'')}</span></div><div class="task-list"></div>`;
            
            const taskList = cell.querySelector('.task-list');
            const dayTasks = [];
            window.subjects.forEach(sub => {
                const sDate = new Date(sub.subStart); sDate.setHours(0,0,0,0);
                const eDate = new Date(sub.subEnd); eDate.setHours(0,0,0,0);
                if(curr >= sDate && curr <= eDate && sub.rates[curr.getDay()] > 0) {
                    let content = "";
                    if(sub.isSelf) {
                        content = `${sub.name}: <span class="self-line"></span>`;
                    } else {
                        let totalPassed = 0; let temp = new Date(sDate);
                        while(temp < curr) { totalPassed += sub.rates[temp.getDay()]; temp.setDate(temp.getDate() + 1); }
                        const sNum = sub.startNo + totalPassed;
                        const daily = sub.rates[curr.getDay()];
                        const eNum = Math.min(sNum + daily - 1, sub.endNo);
                        content = `${sub.name}: ${sNum === eNum ? sNum : sNum+'~'+eNum}${sub.unit}`;
                    }
                    dayTasks.push(content);
                }
            });

            // [수정점] 줄간격 자동 조절 로직: 양이 많아지면 줄간격을 좁히고 요일 공간을 보존
            const taskCount = dayTasks.length;
            if (taskCount > 7) {
                taskList.classList.add('two-cols');
                taskList.style.lineHeight = taskCount > 12 ? '1.1' : '1.2';
                taskList.style.fontSize = taskCount > 12 ? '7px' : '8px';
            } else if (taskCount > 4) {
                taskList.style.lineHeight = '1.3';
                taskList.style.fontSize = '8px';
            } else {
                taskList.style.lineHeight = '1.6';
                taskList.style.fontSize = '8.5px';
            }

            dayTasks.forEach(task => {
                taskList.innerHTML += `<div class="task-item"><input type="checkbox"><span>${task}</span></div>`;
            });

            grid.appendChild(cell);
        }
        document.getElementById('preview').appendChild(page);
    }

    function calculatePhases(start, end) {
        const diff = Math.ceil((end - start) / 86400000);
        let ratios = [], titles = ["1회독: 개념기본", "2회독: 문제풀이", "3회독: 심화오답", "최종: 시험전날"];
        if(diff >= 42) ratios = [21, 14, 6]; 
        else if(diff >= 35) ratios = [21, 13]; 
        else if(diff >= 28) ratios = [21, 6]; 
        else ratios = [diff - 1];

        let phases = [], currentStart = new Date(start);
        ratios.forEach((days, i) => {
            let pEnd = new Date(currentStart); pEnd.setDate(currentStart.getDate() + days - 1);
            if(pEnd >= end) pEnd = new Date(end.getTime() - 86400000);
            phases.push({ start: new Date(currentStart), end: pEnd, title: titles[i] });
            currentStart = new Date(pEnd.getTime() + 86400000);
        });
        const finalDay = new Date(end.getTime() - 86400000);
        phases.push({ start: finalDay, end: finalDay, title: "시험 전날 마무리" });
        return phases;
    }

    const todayLocal = new Date(Date.now() - new Date().getTimezoneOffset() * 60000).toISOString().split('T')[0];
    document.getElementById('startDate').value = todayLocal;
    document.getElementById('subStart').value = todayLocal;
    renderAll();
</script>
</body>
</html>
